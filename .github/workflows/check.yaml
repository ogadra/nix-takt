name: check
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run Gitleaks
        run: nix run nixpkgs#gitleaks -- detect --source . --config .gitleaks.toml

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run nixfmt
        run: nix run nixpkgs#nixfmt-rfc-style -- --check flake.nix package.nix dev/flake.nix
      - name: Run deadnix
        run: nix run nixpkgs#deadnix -- flake.nix package.nix dev/flake.nix
      - name: Run statix
        run: nix run nixpkgs#statix -- check .
      - name: Run oxfmt
        run: nix run nixpkgs#oxfmt -- --check update.ts versions/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run tsc
        run: npx tsc --noEmit

  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build package
        run: nix build -L
      - name: Check version
        run: |
          version=$(nix run . -- --version)
          echo "Detected version: $version"
          if ! echo "$version" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$"; then
            echo "Error: Version output does not match expected format"
            exit 1
          fi
          echo "Version check passed: $version"
